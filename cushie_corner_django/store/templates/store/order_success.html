{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Placed – Cushie Corner</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'store/css/style.css' %}">
</head>
<body>
<header class="navbar scrolled">
  <div class="brand">
    <img src="{% static 'store/images/cushie_corner_logo.jpg' %}" alt="Cushie Corner Logo">
    <span class="brand-name">Cushie Corner</span>
  </div>
</header>

<section class="success-page section">
  <div class="success-box">
    <div class="success-icon">&#10003;</div>
    <h1>Order Placed!</h1>
    <p>Thank you, <strong>{{ order.customer_name }}</strong>!</p>
    <p>Your order <strong>#{{ order.id }}</strong> has been received.</p>
    <p>We'll contact you at <strong>{{ order.customer_email }}</strong> soon.</p>
    <div class="success-total">Total: <strong>&#8377;{{ order.total }}</strong></div>
    <a href="{% url 'index' %}" class="shop-btn"><span>Continue Shopping</span></a>
  </div>
</section>

<footer class="footer">
  <div class="footer-content">
    <p class="footer-copy">&copy; 2025 Cushie Corner</p>
  </div>
</footer>
<script src="{% static 'store/js/main.js' %}"></script>
</body>
</html>
